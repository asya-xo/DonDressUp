<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhaserSecond</title>

  <style>
    /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
    *,dfgdghm
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      line-height: 1;
      font-family: Arial, sans-serif;
      background-color: #040218;
    }

    /* HTML input overlay (Welcome.js will show n hide it) */
    #nameForm {
      position: absolute;
      display: none;           /* hidden until Welcome.js turns it on */
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    #nameInput {
      width: 520px;
      padding: 20px 22px;
      font-size: 24px;
      border-radius: 18px;
      border: 2px solid rgba(0,0,0,0.12);
      outline: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    ol, ul {
      list-style: none;
    }

    img, video {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>
  <div id="game-container"></div>

  <!-- For the input field (Welcome.js will control this by id) -->
  <form id="nameForm" autocomplete="off">
    <input
      id="nameInput"
      type="text"
      maxlength="16"
      placeholder="Type your name <3…"
      autocomplete="off"
    />
  </form>

  <script src="./phaser.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
